<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Página Web</title>

    <!-- Incluir la librería EmailJS desde CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script type="text/javascript">
        (function () {
            emailjs.init("3btjA-SD2GX-kn1Wm");
        })();
    </script>

    <style>
        /* Variables de color y Reset */
        :root {
            --primary-color: #4f46e5;
            /* Indigo por defecto */
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
            --error-color: #ef4444;
            --success-color: #10b981;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* Contenedor tipo Tarjeta (Landing) */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem 2rem;
            transition: transform var(--transition-speed) ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Encabezados y Textos */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Grupos de Formulario */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
            background-color: #f9fafb;
            outline: none;
            color: var(--text-main);
        }

        .form-input:focus {
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Slider Personalizado y Dinámico */
        .slider-wrapper {
            position: relative;
            padding-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* Badge Flotante del Valor */
        .slider-badge {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--primary-color);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.25rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: left 0.1s ease-out, background-color var(--transition-speed) ease;
            z-index: 10;
        }

        /* Triangulito inferior del badge */
        .slider-badge::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: var(--primary-color) transparent transparent transparent;
            transition: border-color var(--transition-speed) ease;
        }

        /* Contenedor base de la barra */
        .range-container {
            position: relative;
            margin-top: 15px;
            height: 24px;
            display: flex;
            align-items: center;
        }

        /* Barra de progreso coloreada que se llena */
        .range-fill {
            position: absolute;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 4px;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 1;
            transition: background-color var(--transition-speed) ease;
        }

        /* El input rango real */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            position: absolute;
            z-index: 2;
            margin: 0;
            height: 100%;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* Track (fondo gris del rango) */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 4px;
        }

        /* Botón/Thumb arrastrable */
        input[type=range]::-webkit-slider-thumb {
            height: 26px;
            width: 26px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid var(--primary-color);
            cursor: w-resize;
            -webkit-appearance: none;
            margin-top: -9px;
            /* Centrar verticalmente en el track de 8px */
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.15s ease, border-color var(--transition-speed) ease;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(0.95);
            cursor: grabbing;
        }

        /* Textos de Min - Max */
        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Botón Enviar */
        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 1rem;
        }

        .btn-submit:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Estado del botón mientras envía */
        .btn-submit:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Spinner de Carga animado */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
            position: absolute;
        }

        .btn-loading .btn-text {
            visibility: hidden;
            /* Oculta el texto sin perder el ancho */
        }

        .btn-loading .spinner {
            display: block;
            /* Muestra el spinner */
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Mensajes de Resultado */
        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            animation: slideDown 0.4s ease-out;
            line-height: 1.4;
        }

        .status-success {
            background-color: #ecfdf5;
            color: var(--success-color);
            border: 1px solid #6ee7b7;
        }

        .status-error {
            background-color: #fef2f2;
            color: var(--error-color);
            border: 1px solid #fca5a5;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsividad Básica */
        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            <h1>Evaluación de Página Web</h1>
            <p>Tu opinión es muy importante. Califícanos del 1 al 100.</p>
        </div>

        <form id="evaluationForm">
            <div class="form-group">
                <label for="userName">Nombre Completo</label>
                <input type="text" id="userName" name="userName" class="form-input" placeholder="Ej. Juan Pérez"
                    required>
            </div>

            <div class="form-group">
                <label for="userEmail">Correo Electrónico</label>
                <input type="email" id="userEmail" name="userEmail" class="form-input" placeholder="ejemplo@correo.com"
                    required>
            </div>

            <div class="form-group slider-wrapper">
                <label for="userScore">Calificación</label>

                <!-- Insignia numérica flotante -->
                <div class="slider-badge" id="sliderBadge">50</div>

                <div class="range-container">
                    <!-- Barra de progreso de color dinámico -->
                    <div class="range-fill" id="rangeFill" style="width: 50%;"></div>
                    <!-- Control original -->
                    <input type="range" id="userScore" name="userScore" min="1" max="100" value="50">
                </div>

                <div class="range-labels">
                    <span>1 (Deficiente)</span>
                    <span>100 (Excelente)</span>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Enviar Evaluación</span>
                <div class="spinner"></div>
            </button>
        </form>

        <!-- Contenedor para mensajes de éxito/error -->
        <div id="statusBox" class="status-box"></div>
    </div>

    <script>

        const EMAILJS_SERVICE_ID = "service_9k4jlxr";
        const EMAILJS_TEMPLATE_ID = "template_551llgc";

        // ==========================================================
        // URL DE GOOGLE APPS SCRIPT (Google Sheets)
        // ==========================================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2bbp_SkF3dQx3cOtVz8tUqT_mKYLGOtXXJWcV6NW-iDxGflFUx3LqVs9XH0lUymYl/exec://script.google.com/macros/s/AKfycbw2bbp_SkF3dQx3cOtVz8tUqT_mKYLGOtXXJWcV6NW-iDxGflFUx3LqVs9XH0lUymYl/exec";

        // Referencias a los elementos del DOM
        const form = document.getElementById('evaluationForm');
        const sliderInput = document.getElementById('userScore');
        const sliderBadge = document.getElementById('sliderBadge');
        const rangeFill = document.getElementById('rangeFill');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');

        function updateSliderEffects() {
            const min = parseInt(sliderInput.min) || 1;
            const max = parseInt(sliderInput.max) || 100;
            const value = parseInt(sliderInput.value);

            // Calculamos porcentaje del 0 al 100%
            const percent = ((value - min) / (max - min)) * 100;

            // 1. Actualizar el número dibujado
            sliderBadge.textContent = value;

            // 2. Mover la insignia flotante con corrección de posición
            //    A medida que la bola avanza, calculamos la desviación para centrarlo.
            const thumbCorrection = 13 - (percent * 0.26); // Basado en 26px de ancho del thumb
            sliderBadge.style.left = `calc(${percent}% + ${thumbCorrection}px)`;

            // 3. Rellenar la barra de progreso inferior
            rangeFill.style.width = `${percent}%`;

            // 4. Color dinámico del tema
            let themeColor = '#10b981'; // Verde (Bueno) por defecto
            if (value <= 40) {
                themeColor = '#ef4444'; // Rojo (Deficiente)
            } else if (value <= 70) {
                themeColor = '#f59e0b'; // Naranja (Regular)
            }

            // Aplicamos el color a las variables CSS (afecta el rango y botones)
            document.documentElement.style.setProperty('--primary-color', themeColor);
            document.documentElement.style.setProperty('--primary-hover', themeColor);

            // Modificamos directamente el borde del triángulo tooltip (::after se hereda)
            sliderBadge.style.backgroundColor = themeColor;
            sliderInput.style.borderColor = themeColor;
        }

        // Ejecutar actualización al iniciar y al mover el slider
        updateSliderEffects();
        sliderInput.addEventListener('input', updateSliderEffects);


        // ==========================================================
        // MANEJO DEL ENVÍO DE FORMULARIO CON EMAILJS
        // ==========================================================
        form.addEventListener('submit', function (e) {
            e.preventDefault(); // Evita recargar la página

            // Capturar datos y limpiar espacios
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const score = sliderInput.value;

            // Validación de seguridad adicional
            if (!name || !email) {
                showMessage("Por favor, completa todos los campos requeridos.", "error");
                return;
            }

            // Cambiar estado del botón a "Cargando..." y deshabilitar
            submitBtn.disabled = true;
            submitBtn.classList.add('btn-loading');
            hideMessage();

            // Preparar los parámetros tal y como los espera la plantilla de EmailJS
            const templateParams = {
                from_name: name,
                evaluator_email: email,
                score: score,
                date: new Date().toLocaleString() // Fecha local legible
            };

            // Ejecutar envío de EmailJS
            const emailPromise = emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);

            // Ejecutar envío a Google Sheets (si la URL está configurada)
            let sheetPromise = Promise.resolve();
            if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL.startsWith("http")) {
                sheetPromise = fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(templateParams)
                });
            }

            // Esperar a que ambos procesos terminen (Email y Sheets)
            Promise.all([emailPromise, sheetPromise])
                .then(function () {
                    console.log('SUCCESS! Datos enviados a EmailJS y Google Sheets.');
                    showMessage("👉 Gracias por tu evaluación. Tu respuesta ha sido procesada correctamente.", "success");

                    // Limpiar campos form
                    form.reset();
                    // Restaurar UI del slider al valor por defecto (50)
                    updateSliderEffects();
                })
                .catch(function (error) {
                    console.error('FAILED...', error);
                    showMessage("Hubo un problema al enviar tu evaluación. Revisa tu conexión y vuelve a intentar.", "error");
                })
                .finally(function () {
                    // Independientemente de si hay error o éxito, restaurar botón
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('btn-loading');
                });
        });

        function showMessage(text, type) {
            statusBox.textContent = text;
            statusBox.className = `status-box status-${type}`;
            statusBox.style.display = 'block';
        }

        function hideMessage() {
            statusBox.style.display = 'none';
        }
    </script>
</body>

</html>
